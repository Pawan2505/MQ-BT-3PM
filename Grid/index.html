<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <!-- 
    
    1row = > 12 column
    -->



    <div>
        <div class="row bg-info text-center">

            <div class="col bg-primary">Column-1</div>
            <div class="col bg-danger">Column-2</div>
            <div class="col bg-secondary">Column-3</div>
            <div class="col">Column-4</div>
            <div class="col bg-primary">Column-1</div>
            <div class="col bg-danger">Column-2</div>
            <div class="col bg-secondary">Column-3</div>
            <div class="col">Column-4</div>
            <div class="col bg-primary">Column-1</div>
            <div class="col bg-danger">Column-2</div>
            <div class="col bg-secondary">Column-3</div>
            <div class="col">Column-4</div>

        </div>


        <div class="row bg-danger mt-5 text-center">
            <div class="col-6 bg-primary">Col-1</div>
            <div class="col-5 bg-info">col-2</div>
            <div class="col-1">col-3</div>
        </div>
    </div>



    <div class="container-fluid mt-4">
        <div class="p-5 row bg-success  text-center">
            <div class="col bg-warning col-lg-6  col-md-5">Column-1</div>
            <div class="col bg-info-subtle">Column-2</div>
            <div class="col bg-dark-subtle">Column-3</div>
            <div class="col bg-white">Column-4</div>
        </div>
    </div>


    <div class="container mt-5 mb-5">
        <div class="row row-cols-lg-3  row-cols-md-2 row-cols-sm-1">
            <div class="col bg-warning ">Column-1</div>
            <div class="col bg-info-subtle">Column-2</div>
            <div class="col bg-dark-subtle">Column-3</div>
            <div class="col bg-white">Column-4</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
